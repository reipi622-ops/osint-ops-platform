openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: OSINT Platform API - collects and analyzes events from Arabic news sources
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: OSINT event management
  - name: sources
    description: News source management
  - name: scraper
    description: Scraper control
  - name: telegram
    description: Telegram channel monitoring and authentication
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events with filters
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: side
          in: query
          schema: { type: string, enum: [red, blue, neutral] }
        - name: source_id
          in: query
          schema: { type: integer }
        - name: source_name
          in: query
          schema: { type: string }
        - name: has_location
          in: query
          schema: { type: boolean }
        - name: date_from
          in: query
          schema: { type: string, format: date-time }
        - name: date_to
          in: query
          schema: { type: string, format: date-time }
        - name: search
          in: query
          schema: { type: string }
        - name: lat
          in: query
          schema: { type: number }
        - name: lng
          in: query
          schema: { type: number }
        - name: radius_km
          in: query
          schema: { type: number }
        - name: is_important
          in: query
          schema: { type: boolean }
        - name: confidence_level
          in: query
          schema: { type: string, enum: [low, medium, high, verified] }
        - name: hide_propaganda
          in: query
          schema: { type: boolean }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a new event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"

  /events/alerts:
    get:
      operationId: listAlerts
      tags: [events]
      summary: List important/high-priority events
      parameters:
        - name: side
          in: query
          schema: { type: string, enum: [red, blue, neutral] }
        - name: confidence_level
          in: query
          schema: { type: string, enum: [low, medium, high, verified] }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: List of important events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventListResponse"

  /events/timeline:
    get:
      operationId: getEventsTimeline
      tags: [events]
      summary: Get hourly event counts for the last N hours
      parameters:
        - name: hours
          in: query
          schema: { type: integer, default: 24, minimum: 1, maximum: 168 }
      responses:
        "200":
          description: Hourly event counts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventTimelineResponse"

  /events/stats:
    get:
      operationId: getDashboardStats
      tags: [events]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /events/{eventId}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event by ID
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
        "404":
          description: Not found
    put:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventResponse"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - name: eventId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /sources:
    get:
      operationId: listSources
      tags: [sources]
      summary: List all sources
      responses:
        "200":
          description: List of sources
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SourceResponse"
    post:
      operationId: createSource
      tags: [sources]
      summary: Add a new source
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceInput"
      responses:
        "201":
          description: Created source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"

  /sources/{sourceId}:
    put:
      operationId: updateSource
      tags: [sources]
      summary: Update source
      parameters:
        - name: sourceId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SourceUpdate"
      responses:
        "200":
          description: Updated source
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceResponse"
    delete:
      operationId: deleteSource
      tags: [sources]
      summary: Delete source
      parameters:
        - name: sourceId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  /scraper/status:
    get:
      operationId: getScraperStatus
      tags: [scraper]
      summary: Get scraper status
      responses:
        "200":
          description: Scraper status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperStatus"

  /scraper/trigger:
    post:
      operationId: triggerScraper
      tags: [scraper]
      summary: Trigger scraper run
      responses:
        "200":
          description: Scraper triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScraperStatus"

  /telegram/auth/status:
    get:
      operationId: getTelegramAuthStatus
      tags: [telegram]
      summary: Get Telegram authentication and monitor status
      responses:
        "200":
          description: Telegram status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramAuthStatus"

  /telegram/auth/request-code:
    post:
      operationId: telegramRequestCode
      tags: [telegram]
      summary: Send Telegram login code to phone
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramCodeRequest"
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  phone: { type: string }
                required: [message, phone]
        "503":
          description: Not configured

  /telegram/auth/verify-code:
    post:
      operationId: telegramVerifyCode
      tags: [telegram]
      summary: Verify Telegram login code (and optional 2FA password)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramVerifyRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  authorized: { type: boolean }
                required: [message, authorized]
        "400":
          description: Invalid code

  /telegram/auth/logout:
    post:
      operationId: telegramLogout
      tags: [telegram]
      summary: Log out from Telegram
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                required: [message]

  /telegram/channels:
    get:
      operationId: listTelegramChannels
      tags: [telegram]
      summary: List monitored Telegram channels
      responses:
        "200":
          description: Channel list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TelegramChannelResponse"
    post:
      operationId: addTelegramChannel
      tags: [telegram]
      summary: Add a Telegram channel to monitor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramChannelInput"
      responses:
        "201":
          description: Channel added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramChannelResponse"
        "409":
          description: Channel already exists

  /telegram/channels/{channelId}/approve:
    post:
      operationId: approveTelegramChannel
      tags: [telegram]
      summary: Approve a channel for monitoring (whitelist it)
      parameters:
        - name: channelId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Channel approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramChannelResponse"
        "404":
          description: Not found
        "422":
          description: Not a public broadcast channel

  /telegram/channels/{channelId}/test-fetch:
    post:
      operationId: testFetchTelegramChannel
      tags: [telegram]
      summary: Manually fetch the latest 10 messages from a channel
      parameters:
        - name: channelId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Fetch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  fetched: { type: integer }
                  channel: { type: string }
                required: [fetched, channel]
        "404":
          description: Not found
        "503":
          description: Telegram not authorized

  /telegram/channels/{channelId}:
    patch:
      operationId: updateTelegramChannel
      tags: [telegram]
      summary: Update a Telegram channel (toggle active, rename)
      parameters:
        - name: channelId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TelegramChannelUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramChannelResponse"
        "404":
          description: Not found
    delete:
      operationId: deleteTelegramChannel
      tags: [telegram]
      summary: Remove a Telegram channel
      parameters:
        - name: channelId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
        version: { type: string }
        database: { type: string }
        metrics:
          oneOf:
            - $ref: "#/components/schemas/SystemMetrics"
            - type: "null"
      required: [status]

    SystemMetrics:
      type: object
      properties:
        cpu_percent: { type: number }
        memory_mb: { type: number }
        memory_percent: { type: number }
        uptime_seconds: { type: number }
        sse_subscribers: { type: integer }
        events_total: { type: integer }
        events_today: { type: integer }
        alerts_total: { type: integer }
      required: [cpu_percent, memory_mb, memory_percent, uptime_seconds, sse_subscribers, events_total, events_today, alerts_total]

    EventResponse:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        title_he: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        description_he: { type: ["string", "null"] }
        category: { type: string }
        side: { type: string, enum: [red, blue, neutral], default: neutral }
        confidence: { type: number }
        source_id: { type: ["integer", "null"] }
        source_name: { type: ["string", "null"] }
        source_url: { type: ["string", "null"] }
        location_name: { type: ["string", "null"] }
        lat: { type: ["number", "null"] }
        lng: { type: ["number", "null"] }
        original_lang: { type: string }
        raw_text: { type: ["string", "null"] }
        event_hash: { type: string }
        is_duplicate: { type: boolean }
        scraped_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        event_date: { type: ["string", "null"], format: date-time }
        is_important: { type: boolean, default: false }
        importance_score: { type: number, default: 0.0 }
        importance_tags: { type: ["string", "null"] }
        confirmation_count: { type: integer, default: 0 }
        confirming_sources: { type: ["string", "null"] }
        has_media: { type: boolean, default: false }
        propaganda_score: { type: number, default: 0.0 }
        confidence_level: { type: string, enum: [low, medium, high, verified], default: low }
      required: [id, title, category, side, confidence, original_lang, event_hash, is_duplicate, scraped_at, created_at]

    EventInput:
      type: object
      properties:
        title: { type: string }
        title_he: { type: string }
        description: { type: string }
        description_he: { type: string }
        category: { type: string, default: other }
        confidence: { type: number, default: 0.5 }
        source_id: { type: integer }
        source_name: { type: string }
        source_url: { type: string }
        location_name: { type: string }
        lat: { type: number }
        lng: { type: number }
        original_lang: { type: string, default: ar }
        raw_text: { type: string }
        event_date: { type: string, format: date-time }
      required: [title]

    EventUpdate:
      type: object
      properties:
        title: { type: string }
        title_he: { type: string }
        description: { type: string }
        description_he: { type: string }
        category: { type: string }
        lat: { type: number }
        lng: { type: number }
        location_name: { type: string }

    EventListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/EventResponse"
        total: { type: integer }
        offset: { type: integer }
        limit: { type: integer }
      required: [items, total, offset, limit]

    SourceResponse:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        type: { type: string }
        url: { type: string }
        is_active: { type: boolean }
        last_scraped_at: { type: ["string", "null"], format: date-time }
        created_at: { type: string, format: date-time }
        events_count: { type: integer }
        reliability_score: { type: number, default: 0.5 }
      required: [id, name, type, url, is_active, created_at, events_count, reliability_score]

    SourceInput:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        url: { type: string }
        is_active: { type: boolean, default: true }
      required: [name, type, url]

    SourceUpdate:
      type: object
      properties:
        name: { type: string }
        type: { type: string }
        url: { type: string }
        is_active: { type: boolean }

    CategoryCount:
      type: object
      properties:
        category: { type: string }
        count: { type: integer }
      required: [category, count]

    SourceCount:
      type: object
      properties:
        source_name: { type: string }
        count: { type: integer }
      required: [source_name, count]

    DailyCount:
      type: object
      properties:
        date: { type: string }
        count: { type: integer }
        categories:
          type: object
          additionalProperties: { type: integer }
      required: [date, count, categories]

    DashboardStats:
      type: object
      properties:
        total_events: { type: integer }
        events_today: { type: integer }
        events_this_week: { type: integer }
        by_category:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"
        by_source:
          type: array
          items:
            $ref: "#/components/schemas/SourceCount"
        recent_timeline:
          type: array
          items:
            $ref: "#/components/schemas/DailyCount"
      required: [total_events, events_today, events_this_week, by_category, by_source, recent_timeline]

    ScraperStatus:
      type: object
      properties:
        is_running: { type: boolean }
        last_run_at: { type: ["string", "null"], format: date-time }
        last_run_events: { type: integer }
        last_run_errors:
          type: array
          items: { type: string }
        sources_count: { type: integer }
      required: [is_running, last_run_events, last_run_errors, sources_count]

    TelegramAuthStatus:
      type: object
      properties:
        configured: { type: boolean }
        connected: { type: boolean }
        authorized: { type: boolean }
        phone: { type: ["string", "null"] }
        monitoring: { type: boolean }
        channels_active: { type: integer }
        messages_processed: { type: integer }
        messages_rejected: { type: integer, default: 0 }
        raw_updates_received: { type: integer, default: 0 }
        last_message_at: { type: ["string", "null"], format: date-time }
        error: { type: ["string", "null"] }
      required: [configured, connected, authorized, monitoring, channels_active, messages_processed]

    TelegramCodeRequest:
      type: object
      properties:
        phone: { type: string }
      required: [phone]

    TelegramVerifyRequest:
      type: object
      properties:
        phone: { type: string }
        code: { type: string }
        password: { type: ["string", "null"] }
      required: [phone, code]

    TelegramChannelInput:
      type: object
      properties:
        username: { type: string }
        title: { type: string }
        is_active: { type: boolean, default: true }
      required: [username]

    TelegramChannelUpdate:
      type: object
      properties:
        title: { type: string }
        is_active: { type: boolean }
        is_approved: { type: boolean }

    ListenerStatus:
      type: object
      properties:
        joined: { type: boolean }
        error: { type: ["string", "null"] }
        polled_at: { type: ["string", "null"], format: date-time }
      required: [joined]

    TelegramChannelResponse:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        title: { type: ["string", "null"] }
        channel_id: { type: ["integer", "null"] }
        is_active: { type: boolean }
        is_approved: { type: boolean }
        approved_at: { type: ["string", "null"], format: date-time }
        is_public_verified: { type: boolean }
        last_message_id: { type: integer }
        messages_processed: { type: integer }
        created_at: { type: string, format: date-time }
        last_activity_at: { type: ["string", "null"], format: date-time }
        listener_status:
          oneOf:
            - $ref: "#/components/schemas/ListenerStatus"
            - type: "null"
      required: [id, username, is_active, is_approved, is_public_verified, last_message_id, messages_processed, created_at]

    HourlyCount:
      type: object
      properties:
        hour: { type: string }
        total: { type: integer }
        red: { type: integer }
        blue: { type: integer }
        neutral: { type: integer }
      required: [hour, total, red, blue, neutral]

    EventTimelineResponse:
      type: object
      properties:
        hours:
          type: array
          items:
            $ref: "#/components/schemas/HourlyCount"
        window_hours: { type: integer }
      required: [hours, window_hours]
